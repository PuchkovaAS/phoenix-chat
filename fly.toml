app = 'phoenix-chat'  # или ваше имя
primary_region = 'arn'  # Stockholm

[build]

[http_service]
  internal_port = 4000
  force_https = true
  auto_stop_machines = 'stop'  # Экономия: машина спит, когда нет трафика
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '256mb'  # Минимум для старта
  cpu_kind = 'shared'
  cpus = 1
