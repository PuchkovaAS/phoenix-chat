# В корне проекта
cat > fly.toml << 'EOF'
app = "phoenix-chat"
primary_region = "ams"

[build]

[http_service]
  internal_port = 4000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
EOF

# Закоммитьте и запушьте
git add fly.toml
git commit -m "Add fly.toml"
git push origin master
